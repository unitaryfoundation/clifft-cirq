name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 9 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        # Test the oldest supported Cirq minor and the latest allowed <2 range.
        # The floor range catches accidental API creep; the wide range catches
        # compatibility breaks before widening to Cirq 2.x.
        cirq-range:
          - "cirq-core>=1.6,<1.7"
          - "cirq-core>=1.6,<2"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            uv sync --group dev --upgrade
          else
            uv sync --group dev --locked
          fi
          uv pip install --upgrade "${{ matrix.cirq-range }}"
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest
